tasks:
  dev:
    command: 'pnpm dev'
    options:
      persistent: true
      cache: false
  build:
    command: 'pnpm build'
    inputs:
      - 'src/**/*'
      - 'index.html'
      - 'vite.config.ts'
    deps:
      - 'ui:typecheck'
  typecheck:
    command: 'tsc --noEmit'
    inputs:
      - 'src/**/*'
    deps:
      - 'ui:typecheck'
