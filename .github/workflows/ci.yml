name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    name: typecheck + decoupling lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Stale `.tsbuildinfo` from a prior composite build has caused flaky
      # TS2590 reports in this repo. Always start from a clean slate in CI.
      - name: Wipe incremental typecheck cache
        run: find packages apps -name '*.tsbuildinfo' -delete

      - name: Workspace-wide typecheck
        run: pnpm -r exec tsc --noEmit

      # Correctness-level lint gate. .oxlintrc.json escalates `correctness`
      # category rules to errors (including the `no-restricted-imports`
      # decoupling override for @lodestar/{ui,contexts,hooks,helpers}).
      # Warnings are still surfaced in the output but don't fail the job —
      # they're on the pre-existing-tech-debt track.
      - name: Lint (correctness errors only)
        run: pnpm lint
